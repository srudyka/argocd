apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-nginx
  labels:
    app.kubernetes.io/name: sample-nginx
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-nginx
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sample-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
